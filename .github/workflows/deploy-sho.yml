# Builds The Sho and publishes it to GitHub Pages on every push to main.
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".
# If this repo is not named "pecunia-apps", change SHO_BASE below to /<repo-name>/.
name: Deploy The Sho to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/sho/**'
      - '.github/workflows/deploy-sho.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/sho/package-lock.json
      - run: npm ci
        working-directory: apps/sho
      - run: npm run build
        working-directory: apps/sho
        env:
          SHO_BASE: /pecunia-apps/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/sho/dist
      - id: deployment
        uses: actions/deploy-pages@v4
