# Builds The Sho and publishes it to GitHub Pages on every push to main.
# Publishes by force-pushing the built site to the `gh-pages` branch, which
# GitHub Pages serves automatically — no repo settings needed, works with the
# default GITHUB_TOKEN. (The Pages API route needs admin permissions the
# workflow token doesn't have.)
# If this repo is not named "pecunia-apps", change SHO_BASE below to /<repo-name>/.
name: Deploy The Sho to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/sho/**'
      - '.github/workflows/deploy-sho.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/sho/package-lock.json
      - run: npm ci
        working-directory: apps/sho
      - run: npm run build
        working-directory: apps/sho
        env:
          SHO_BASE: /pecunia-apps/
      - name: Publish dist to gh-pages
        working-directory: apps/sho/dist
        run: |
          touch .nojekyll
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy The Sho from ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
